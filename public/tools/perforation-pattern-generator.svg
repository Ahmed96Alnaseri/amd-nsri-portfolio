<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <pattern id="perf" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="8" fill="#b8956a"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
    <mask id="m"><rect width="720" height="540" fill="url(#fade)"/></mask>
  </defs>
  <g mask="url(#m)" opacity="0.5">
    <rect width="720" height="540" fill="url(#perf)"/>
  </g>
